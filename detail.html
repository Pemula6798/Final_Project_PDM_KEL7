<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="product-detail-page">
    <header>
        <nav>
            <a href="index.html" class="logo">Toko AutoZone</a>
            <div class="menu">
                <a href="product.html">Produk</a>
                <a href="cart.html">Keranjang</a>
                <a href="wishlist.html">Daftar Keinginan</a>
                <a href="notifications.html">Notifikasi</a>
                <a href="status.html">Status Pesanan</a>
                <a href="contact.html">Contact</a>
                <a href="login.html">Login</a>
            </div>
        </nav>
    </header>

    <section class="product-detail">
        <h2 id="product-name">Nama Produk</h2>
        <img id="product-image" src="assets/images/default.jpg" alt="Produk">
        <p id="product-description">Deskripsi Produk</p>
        <p id="product-price">Harga: Rp 0</p>
        <button onclick="addToCart()">Tambah ke Keranjang</button>
        <div id="reviews">
            <h3>Ulasan</h3>
            <div id="review-list">
                <!-- Ulasan akan dimuat di sini melalui JavaScript -->
            </div>
            <textarea id="review-text" placeholder="Tulis ulasan..."></textarea>
            <button onclick="addReview()">Tambahkan Ulasan</button>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Toko AutoZone</p>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
