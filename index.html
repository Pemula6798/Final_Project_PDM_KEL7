<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online - Beranda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header dengan menu -->
    <header>
        <nav>
            <a href="index.html" class="logo">Toko AutoZone</a>
            <div class="menu">
                <a href="product.html">Produk</a>
                <a href="cart.html">Keranjang</a>
                <a href="login.html">Login</a>
                <a href="register.html">Daftar</a>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Selamat datang di Toko AutoZone</h1>
            <p>Temukan produk terbaik di sini!</p>
            <!-- Pencarian -->
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Cari produk..." oninput="searchProducts()">
            </div>
        </div>
    </section>

    <!-- Featured Products Section -->
    <section class="featured-products">
        <h2>Produk Terpopuler</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="assets/images/arc_audio_x2_6_2.jpg" alt="ARC Audio X2 6.2">
                <h3>ARC Audio X2 6.2</h3>
                <p>Harga: Rp 3.000.000</p>
                <button onclick="addToCart('ARC Audio X2 6.2')">Tambah ke Keranjang</button>
            </div>
            <div class="product-card">
                <img src="assets/images/j100-gps-tracking-device.png" alt="J100 GPS">
                <h3>J100 GPS</h3>
                <p>Harga: Rp 1.200.000</p>
                <button onclick="addToCart('J100 GPS')">Tambah ke Keranjang</button>
            </div>
            <div class="product-card">
                <img src="assets/images/jc_200.png" alt="JC 200"> <!-- Gambar JC 200 diperbaiki menjadi PNG -->
                <h3>JC 200</h3>
                <p>Harga: Rp 4.500.000</p>
                <button onclick="addToCart('JC 200')">Tambah ke Keranjang</button>
            </div>
            <div class="product-card">
                <img src="assets/images/nakamichi_nt39.jpeg" alt="Nakamichi NT39">
                <h3>Nakamichi NT39</h3>
                <p>Harga: Rp 2.800.000</p>
                <button onclick="addToCart('Nakamichi NT39')">Tambah ke Keranjang</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Toko AutoZone</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
