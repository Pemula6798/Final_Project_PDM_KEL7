<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko AutoZone</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Header dengan menu -->
    <header>
        <nav>
            <a href="index.html" class="logo">Toko AutoZone</a>
            <div class="menu">
                <a href="product.html">Produk</a>
                <a href="cart.html">Keranjang</a>
                <a href="wishlist.html">Daftar Keinginan</a>
                <a href="notifications.html">Notifikasi</a>
                <a href="status.html">Status Pesanan</a>
                <a href="contact.html">Contact</a>
                <a href="login.html">Login</a>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Selamat datang di Toko AutoZone</h1>
            <p>Temukan produk terbaik di sini!</p>
            <!-- Pencarian -->
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Cari produk..." oninput="searchProducts()">
            </div>
        </div>
    </section>

    <!-- Featured Products Section -->
    <section class="featured-products">
        <h2>Produk Terpopuler</h2>
        <div class="product-grid" id="featured-products">
            <!-- Produk akan dimuat di sini melalui JavaScript -->
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Toko AutoZone</p>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
